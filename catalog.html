<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catalog | ENZO — Wholesale Fabric Supplier, Lahore</title>
  <meta name="description" content="ENZO wholesale fabric catalog — 15 SKUs across Wash n Wear, Cotton, Boski and Winter collections. 10,000m MOQ. Request a quote for any article.">
  <link rel="icon" href="/assets/logo/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="output.css">
</head>
<body>

<!--NAV-->

<main>

  <!-- ── PAGE HEADER — Dark Navy ── -->
  <section style="background-color:#0E1825;padding-top:140px;padding-bottom:56px;" aria-label="Page header">
    <div class="content-rail">
      <p class="enzo-label mb-4" style="color:#5C7386;">B2B Wholesale — No Public Pricing</p>
      <h1 style="font-family:'Bebas Neue',sans-serif;font-size:clamp(2.5rem,5vw,4rem);line-height:1;letter-spacing:0.02em;color:#F5F8FA;margin:0 0 1rem;">
        Fabric Catalog
      </h1>
      <p style="font-size:0.9375rem;color:#D6DEE6;max-width:500px;line-height:1.7;">
        15 qualities across four collections. All pricing is quote-only — select any article and request a quotation. Minimum order 10,000 metres.
      </p>
    </div>
  </section>

  <!-- ── CATALOG GRID — Ice White (light section) ── -->
  <section class="light-section section-pad" style="background-color:#F5F8FA;" aria-label="Product catalog">
    <div class="content-rail">

      <!-- Filter tabs -->
      <div class="flex flex-wrap gap-3 mb-10" role="group" aria-label="Filter by category">
        <button data-filter="all"    class="enzo-filter-btn" aria-pressed="true">All</button>
        <button data-filter="wash"   class="enzo-filter-btn" aria-pressed="false">Wash n Wear</button>
        <button data-filter="cotton" class="enzo-filter-btn" aria-pressed="false">Cotton</button>
        <button data-filter="boski"  class="enzo-filter-btn" aria-pressed="false">Boski</button>
        <button data-filter="winter" class="enzo-filter-btn" aria-pressed="false">Winter</button>
      </div>

      <!-- Cards injected by catalog.js -->
      <div id="catalog-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" aria-label="Product grid">
        <!-- rendered by catalog.js from data/products.js -->
      </div>

      <!-- Secondary CTA -->
      <div class="text-center mt-14 fade-up">
        <p style="font-size:0.875rem;color:#5C7386;margin-bottom:1rem;">
          Can't find what you need? We can discuss custom specifications.
        </p>
        <a href="/contact.html" class="btn-primary-inv">Get a Quote</a>
      </div>

    </div>
  </section>

</main>

<!--FOOTER-->

<style>
  .enzo-filter-btn {
    font-family: 'Inter', sans-serif;
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.5rem 1.125rem;
    border: 1px solid #5C7386;
    border-radius: 4px;
    background: transparent;
    color: #9DB4C6;
    cursor: pointer;
    transition: background-color 0.15s ease, border-color 0.15s ease, color 0.15s ease;
  }
  .enzo-filter-btn:hover {
    border-color: #9DB4C6;
    color: #F5F8FA;
  }
</style>

<script src="/data/products.js"></script>
<script src="/js/catalog.js"></script>
<script src="/js/motion.js"></script>
</body>
</html>
