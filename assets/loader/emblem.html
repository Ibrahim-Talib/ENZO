<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ENZO Emblem</title>
<style>
  /* Animation only. Canvas is TRANSPARENT and cropped tight to the emblem.
     Background is intentionally none — view on a dark surface (light strokes).
     To preview on a backdrop, uncomment the line below. */
  html, body { margin: 0; height: 100%; background: transparent; }
  body { display: flex; align-items: center; justify-content: center; }

  /* Responsive: scales by WIDTH only, keeps the emblem's own aspect ratio.
     No fixed-height box -> no distortion across phone/PC viewports. */
  #enzo-logo {
    display: block;
    width: 100%;
    height: auto;          /* never force height -> never distort */
    max-width: 460px;      /* loader size */
    margin: 0 auto;        /* center if the container is wider */
    background: transparent;
  }
</style>
</head>
<body>
  <canvas id="enzo-logo" role="img" aria-label="ENZO emblem animated reveal"></canvas>

<script>
(function () {
  "use strict";

  /* ENZO emblem — vanilla, dependency-free. Touches only #enzo-logo. */

// LogoGrow.jsx — generative "the logo draws itself" engine.
// Uses the real artwork as a centerline source. A multi-source geodesic BFS
// seeds the ornament at many independent origin points; each branch grows
// along the real ink from its seed outward with a glowing wavefront tip.
// No fade-in, no rectangular mask wipe — the strokes literally generate the mark.


// ── Luxury palette (brief) ─────────────────────────────────────────────
const ICE   = [206, 230, 252]; // settled stroke (ice blue)
const WHITE = [255, 255, 255]; // active tip
const BG_IN  = [16, 27, 44];   // #101B2C-ish deep navy center
const BG_OUT = [7, 13, 24];    // darker vignette edge

// fraction of canvas height reserved as transparent margin per side (bloom-safe)
var EMBLEM_MARGIN_FRAC = 0.06;

const clamp01 = (v) => (v < 0 ? 0 : v > 1 ? 1 : v);
const smooth = (e) => e * e * (3 - 2 * e);

// ── Precompute: load image, build ink mask, seeds, geodesic growth field ──
function precompute(img) {
  const NW = img.naturalWidth, NH = img.naturalHeight;
  const off = document.createElement('canvas');
  off.width = NW; off.height = NH;
  const octx = off.getContext('2d');
  octx.drawImage(img, 0, 0);
  const src = octx.getImageData(0, 0, NW, NH).data;

  // bbox of visible ink
  const A = (x, y) => src[(y * NW + x) * 4 + 3];
  let minX = NW, minY = NH, maxX = 0, maxY = 0;
  const THR = 22;
  for (let y = 0; y < NH; y++) {
    for (let x = 0; x < NW; x++) {
      if (A(x, y) > THR) {
        if (x < minX) minX = x; if (x > maxX) maxX = x;
        if (y < minY) minY = y; if (y > maxY) maxY = y;
      }
    }
  }
  const pad = 8;
  minX = Math.max(0, minX - pad); minY = Math.max(0, minY - pad);
  maxX = Math.min(NW - 1, maxX + pad); maxY = Math.min(NH - 1, maxY + pad);
  const W = maxX - minX + 1, H = maxY - minY + 1;
  const N = W * H;

  // cropped alpha + mask
  const alpha = new Float32Array(N);
  const mask = new Uint8Array(N);
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const a = src[((y + minY) * NW + (x + minX)) * 4 + 3] / 255;
      const i = y * W + x;
      alpha[i] = a;
      if (a > THR / 255) mask[i] = 1;
    }
  }

  // ── connected components (8-neighbour) ──
  const comp = new Int32Array(N).fill(-1);
  const compSize = []; const compBox = [];
  const stack = new Int32Array(N);
  let nComp = 0;
  for (let s = 0; s < N; s++) {
    if (mask[s] && comp[s] === -1) {
      let sp = 0; stack[sp++] = s; comp[s] = nComp;
      let cnt = 0, bx0 = W, by0 = H, bx1 = 0, by1 = 0;
      while (sp > 0) {
        const c = stack[--sp];
        const cx = c % W, cy = (c / W) | 0;
        cnt++;
        if (cx < bx0) bx0 = cx; if (cx > bx1) bx1 = cx;
        if (cy < by0) by0 = cy; if (cy > by1) by1 = cy;
        for (let dy = -1; dy <= 1; dy++) for (let dx = -1; dx <= 1; dx++) {
          if (!dx && !dy) continue;
          const nx = cx + dx, ny = cy + dy;
          if (nx < 0 || ny < 0 || nx >= W || ny >= H) continue;
          const ni = ny * W + nx;
          if (mask[ni] && comp[ni] === -1) { comp[ni] = nComp; stack[sp++] = ni; }
        }
      }
      compSize.push(cnt);
      compBox.push([bx0, by0, bx1, by1]);
      nComp++;
    }
  }

  // identify FRAME components: span > 70% of W or H (the outer diamond)
  const isFrameComp = new Uint8Array(nComp);
  for (let c = 0; c < nComp; c++) {
    const [x0, y0, x1, y1] = compBox[c];
    if ((x1 - x0) > 0.7 * W || (y1 - y0) > 0.7 * H) isFrameComp[c] = 1;
  }

  // ornament bbox (non-frame ink) for placing normalized seeds
  let ox0 = W, oy0 = H, ox1 = 0, oy1 = 0, anyOrn = false;
  for (let i = 0; i < N; i++) {
    if (mask[i] && !isFrameComp[comp[i]]) {
      anyOrn = true;
      const x = i % W, y = (i / W) | 0;
      if (x < ox0) ox0 = x; if (x > ox1) ox1 = x;
      if (y < oy0) oy0 = y; if (y > oy1) oy1 = y;
    }
  }
  if (!anyOrn) { ox0 = 0; oy0 = 0; ox1 = W - 1; oy1 = H - 1; }
  const oW = ox1 - ox0, oH = oy1 - oy0;

  // ── seeds ──
  const seeds = []; // {x,y,delay,dur}
  const snap = (px, py, frameWanted) => {
    px = Math.round(px); py = Math.round(py);
    let best = -1, bestD = 1e9;
    const R = 90;
    for (let r = 0; r <= R; r++) {
      for (let dy = -r; dy <= r; dy++) for (let dx = -r; dx <= r; dx++) {
        if (Math.max(Math.abs(dx), Math.abs(dy)) !== r) continue;
        const nx = px + dx, ny = py + dy;
        if (nx < 0 || ny < 0 || nx >= W || ny >= H) continue;
        const ni = ny * W + nx;
        if (!mask[ni]) continue;
        const fr = isFrameComp[comp[ni]] ? 1 : 0;
        if (frameWanted !== null && fr !== frameWanted) continue;
        const d = dx * dx + dy * dy;
        if (d < bestD) { bestD = d; best = ni; }
      }
      if (best !== -1 && r > 4) break; // good enough once found
    }
    return best;
  };

  const ornDelay = (ny, adx) => 0.28 + ny * 1.95 + adx * 0.6;

  // ornament seeds (normalized within ornament bbox); mirrored pairs share timing
  const ornNorm = [
    [0.50, 0.20], [0.33, 0.18], [0.67, 0.18],
    [0.22, 0.27], [0.78, 0.27],
    [0.15, 0.40], [0.85, 0.40], [0.37, 0.37], [0.63, 0.37],
    [0.50, 0.43],
    [0.29, 0.55], [0.71, 0.55], [0.50, 0.59],
    [0.37, 0.71], [0.63, 0.71], [0.50, 0.79],
    [0.44, 0.87], [0.56, 0.87],
  ];
  for (const [nx, ny] of ornNorm) {
    const px = ox0 + nx * oW, py = oy0 + ny * oH;
    const si = snap(px, py, 0);
    if (si !== -1) seeds.push({ idx: si, delay: ornDelay(ny, Math.abs(nx - 0.5)), dur: 1.4 });
  }
  // top finial — animates LATE per brief
  {
    const si = snap(ox0 + 0.5 * oW, oy0 + 0.04 * oH, 0);
    if (si !== -1) seeds.push({ idx: si, delay: 3.05, dur: 0.75 });
  }
  // frame seeds — at the 4 diamond tips, draw LAST
  const frameNorm = [[0.5, 0.0], [0.5, 1.0], [0.0, 0.5], [1.0, 0.5]];
  let frameX0 = W, frameY0 = H, frameX1 = 0, frameY1 = 0, hasFrame = false;
  for (let c = 0; c < nComp; c++) if (isFrameComp[c]) {
    hasFrame = true;
    const [a, b, cc, d] = compBox[c];
    if (a < frameX0) frameX0 = a; if (b < frameY0) frameY0 = b;
    if (cc > frameX1) frameX1 = cc; if (d > frameY1) frameY1 = d;
  }
  if (hasFrame) {
    for (const [nx, ny] of frameNorm) {
      const px = frameX0 + nx * (frameX1 - frameX0);
      const py = frameY0 + ny * (frameY1 - frameY0);
      const si = snap(px, py, 1);
      if (si !== -1) seeds.push({ idx: si, delay: 3.65, dur: 1.55 });
    }
  }

  // ── multi-source BFS (geodesic Voronoi over ink) ──
  const owner = new Int32Array(N).fill(-1);
  const dist = new Float32Array(N).fill(-1);
  const queue = new Int32Array(N);
  let qh = 0, qt = 0;
  for (let s = 0; s < seeds.length; s++) {
    const id = seeds[s].idx;
    if (owner[id] === -1) { owner[id] = s; dist[id] = 0; queue[qt++] = id; }
  }
  const SQ2 = Math.SQRT2;
  while (qh < qt) {
    const c = queue[qh++];
    const cx = c % W, cy = (c / W) | 0;
    const cd = dist[c], co = owner[c];
    for (let dy = -1; dy <= 1; dy++) for (let dx = -1; dx <= 1; dx++) {
      if (!dx && !dy) continue;
      const nx = cx + dx, ny = cy + dy;
      if (nx < 0 || ny < 0 || nx >= W || ny >= H) continue;
      const ni = ny * W + nx;
      if (!mask[ni] || owner[ni] !== -1) continue;
      owner[ni] = co;
      dist[ni] = cd + ((dx && dy) ? SQ2 : 1);
      queue[qt++] = ni;
    }
  }

  // cleanup: any ink not reached -> new seed per leftover component
  for (let s = 0; s < N; s++) {
    if (mask[s] && owner[s] === -1) {
      // is it outer-ring (frame fragment)? -> late delay
      const sx = s % W, sy = (s / W) | 0;
      const rr = Math.max(Math.abs(sx - W / 2) / (W / 2), Math.abs(sy - H / 2) / (H / 2));
      const late = rr > 0.72;
      const ny = clamp01((sy - oy0) / Math.max(1, oH));
      const seedId = seeds.length;
      seeds.push({
        idx: s,
        delay: late ? 3.65 : ornDelay(ny, Math.abs((sx - ox0) / Math.max(1, oW) - 0.5)),
        dur: late ? 1.55 : 1.4,
      });
      let h = qh = 0, t = 0;
      queue[t++] = s; owner[s] = seedId; dist[s] = 0;
      while (h < t) {
        const c = queue[h++];
        const cx = c % W, cy = (c / W) | 0, cd = dist[c];
        for (let dy = -1; dy <= 1; dy++) for (let dx = -1; dx <= 1; dx++) {
          if (!dx && !dy) continue;
          const nx = cx + dx, nyy = cy + dy;
          if (nx < 0 || nyy < 0 || nx >= W || nyy >= H) continue;
          const ni = nyy * W + nx;
          if (!mask[ni] || owner[ni] !== -1) continue;
          owner[ni] = seedId; dist[ni] = cd + ((dx && dy) ? SQ2 : 1); queue[t++] = ni;
        }
      }
    }
  }

  // per-seed max distance (normalisation) + completion time
  const seedMax = new Float32Array(seeds.length);
  for (let i = 0; i < N; i++) if (owner[i] >= 0 && dist[i] > seedMax[owner[i]]) seedMax[owner[i]] = dist[i];

  // flat ink list with normalised position-along-branch p
  let inkCount = 0;
  for (let i = 0; i < N; i++) if (mask[i]) inkCount++;
  const ixs = new Int32Array(inkCount), iys = new Int32Array(inkCount);
  const ip = new Float32Array(inkCount), ia = new Float32Array(inkCount), iown = new Int32Array(inkCount);
  let k = 0;
  for (let i = 0; i < N; i++) {
    if (!mask[i]) continue;
    const o = owner[i];
    ixs[k] = i % W; iys[k] = (i / W) | 0;
    ip[k] = seedMax[o] > 0 ? dist[i] / seedMax[o] : 0;
    ia[k] = alpha[i]; iown[k] = o;
    k++;
  }

  // last completion time across all branches
  let lastDone = 0;
  for (const s of seeds) lastDone = Math.max(lastDone, s.delay + s.dur);

  // seed display positions
  const seedPos = seeds.map((s) => ({ x: s.idx % W, y: (s.idx / W) | 0, delay: s.delay }));

  return {
    W, H, inkCount, ixs, iys, ip, ia, iown,
    delay: seeds.map((s) => s.delay), dur: seeds.map((s) => s.dur),
    seedPos, lastDone,
    buf: new Uint8ClampedArray(N * 4),
    layer: (() => { const c = document.createElement('canvas'); c.width = W; c.height = H; return c; })(),
  };
}

// ── Per-frame render ────────────────────────────────────────────────────
function drawFrame(canvas, D, t) {
  const ctx = canvas.getContext('2d');
  const CW = canvas.width, CH = canvas.height;

  // TRANSPARENT background — clear the canvas so the host page shows through.
  ctx.clearRect(0, 0, CW, CH);

  if (!D) return;

  // global timing envelopes
  const settleEnd = D.lastDone;            // ~3.6s
  const fadeStart = 7.55, fadeEnd = 7.95;  // brief loop window
  let fade = 1;
  if (t > fadeStart) fade = clamp01(1 - (t - fadeStart) / (fadeEnd - fadeStart));
  // breathing after settle
  let breath = 0;
  if (t > settleEnd) breath = Math.sin((t - settleEnd) * 1.05) * 0.5 + 0.5;
  const breathScale = 1 + 0.010 * breath;
  const breathGlow = 0.55 + 0.45 * breath;

  // build ink layer at native res
  const buf = D.buf;
  buf.fill(0);
  const { ixs, iys, ip, ia, iown, W, inkCount } = D;
  const delay = D.delay, dur = D.dur;
  for (let n = 0; n < inkCount; n++) {
    const o = iown[n];
    const bp = clamp01((t - delay[o]) / dur[o]);
    if (bp <= 0) continue;
    const p = ip[n];
    const reveal = clamp01((bp - p) / 0.018);
    if (reveal <= 0) continue;
    // wavefront tip + just-completed afterglow
    const tip = bp < 1 ? clamp01(1 - (bp - p) / 0.11) : 0;
    const doneT = t - (delay[o] + dur[o]);
    const after = bp >= 1 ? clamp01(1 - doneT / 0.7) : 0;
    let bright = tip + after * 0.55;
    if (bright > 1) bright = 1;
    bright = smooth(bright);
    // settled ambient breathing glow
    const amb = (t > settleEnd) ? 0.12 * breath : 0;
    const b2 = clamp01(bright + amb);

    const idx = (iys[n] * W + ixs[n]) * 4;
    buf[idx]     = ICE[0] + (WHITE[0] - ICE[0]) * b2;
    buf[idx + 1] = ICE[1] + (WHITE[1] - ICE[1]) * b2;
    buf[idx + 2] = ICE[2] + (WHITE[2] - ICE[2]) * b2;
    buf[idx + 3] = 255 * ia[n] * reveal;
  }
  const lctx = D.layer.getContext('2d');
  lctx.putImageData(new ImageData(buf, D.W, D.H), 0, 0);

  // composite ink layer onto display (centered, breathing scale) with bloom
  const targetH = CH * (1 - 2 * EMBLEM_MARGIN_FRAC);
  const scale = (targetH / D.H) * breathScale;
  const dw = D.W * scale, dh = D.H * scale;
  const dx = (CW - dw) / 2, dy = (CH - dh) / 2 - CH * 0.005;

  ctx.save();
  ctx.globalAlpha = fade;
  // wide soft bloom
  ctx.globalCompositeOperation = 'lighter';
  ctx.filter = 'blur(22px)';
  ctx.globalAlpha = 0.40 * fade * breathGlow;
  ctx.drawImage(D.layer, dx, dy, dw, dh);
  // tight glow
  ctx.filter = 'blur(8px)';
  ctx.globalAlpha = 0.55 * fade;
  ctx.drawImage(D.layer, dx, dy, dw, dh);
  ctx.filter = 'none';
  ctx.globalCompositeOperation = 'source-over';
  // crisp strokes
  ctx.globalAlpha = fade;
  ctx.drawImage(D.layer, dx, dy, dw, dh);
  ctx.restore();

  /* ============================= driver =============================== */
  var LEAD = 0.67, SPEED = 1.25, DURATION = 4.0;
  var LOOP = false;           // play once on load and hold the final mark
  var SETTLED_TAU = 5.20;     // fully-drawn frame, used for reduced-motion
  var EMBLEM_H = 880;         // buffer render height (crispness); width derives from emblem aspect

  var canvas = document.getElementById('enzo-logo');
  var D = null, raf = null, startTs = null, running = false;
  var reduced = window.matchMedia &&
                window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function sizeCanvas() {
    // tight buffer: emblem fills (1 - 2*frac) of height, rest is bloom-safe margin
    var ar = D.W / D.H;
    var f = EMBLEM_MARGIN_FRAC;
    canvas.height = EMBLEM_H;
    canvas.width  = Math.round(EMBLEM_H * (1 - 2 * f) * ar + 2 * EMBLEM_H * f);
  }

  var img = new Image();
  img.onload = function () {
    try { D = precompute(img); } catch (e) { console.error('[enzo] precompute failed', e); return; }
    sizeCanvas();
    if (reduced) { drawFrame(canvas, D, SETTLED_TAU); return; }
    start();
  };
  img.onerror = function (e) { console.error('[enzo] logo image failed to load', e); };
  img.src = LOGO_SRC;

  function frame(ts) {
    if (startTs == null) startTs = ts;
    var T = (ts - startTs) / 1000;
    if (LOOP) { T = T % DURATION; }
    else if (T >= DURATION) { T = DURATION; }
    drawFrame(canvas, D, LEAD + T * SPEED);
    if (LOOP || T < DURATION) raf = requestAnimationFrame(frame);
    else running = false;
  }
  function start() {
    if (running || !D || reduced) return;
    running = true; startTs = null;
    raf = requestAnimationFrame(frame);
  }
  function stop() { running = false; if (raf) cancelAnimationFrame(raf); raf = null; }

  document.addEventListener('visibilitychange', function () {
    if (document.hidden) stop(); else start();
  });
  if ('IntersectionObserver' in window) {
    new IntersectionObserver(function (es) {
      es.forEach(function (e) { if (e.isIntersecting) start(); else stop(); });
    }, { threshold: 0.01 }).observe(canvas);
  }
})();
